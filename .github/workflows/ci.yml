name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      run_live_tests:
        description: "Run live network integration tests"
        required: false
        default: "false"

jobs:
  quality:
    name: Quality and Tests (PHP 8.5)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: pcov

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run lint
        run: composer lint

      - name: Run quality
        run: composer quality

  benchmark:
    name: PHPBench
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run benchmarks
        run: vendor/bin/phpbench run --report=default

  live-network:
    name: Live Network Test (optional)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_live_tests == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run live network tests
        env:
          JOOCLIENT_RUN_LIVE_NETWORK_TESTS: '1'
        run: vendor/bin/phpunit tests/Feature/Logging/RealSiteIpLoggingTest.php
